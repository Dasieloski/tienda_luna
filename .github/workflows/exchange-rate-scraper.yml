name: Exchange Rate Scraper (USD/CUP)

on:
  schedule:
    # Cuba is UTC-4 (no DST currently)
    # 06:00 Cuba  = 10:00 UTC
    # 13:00 Cuba  = 17:00 UTC
    # 21:00 Cuba  = 01:00 UTC (next day)
    - cron: '0 10 * * *'
    - cron: '0 17 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch: # permite ejecución manual desde Actions tab

jobs:
  scrape-exchange-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run Exchange Rate Scraper
        run: node scripts/run-exchange-rate-scraper.js
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Notify on failure (optional)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[ALERT] Exchange Rate Scraper failed',
              body: `Workflow run failed: ${context.runUrl}\n\nCheck the logs for details.`,
              labels: ['bug', 'exchange-rate', 'automation']
            })