name: Exchange Rate Scraper (USD/CUP)

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 17 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape-exchange-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Debug - verify script exists and show hash
        run: |
          ls -la scripts/run-exchange-rate-scraper.js
          echo "SCRIPT_VERSION: v2"
          node -e "console.log('Node version:', process.version)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify Node version after setup
        run: node -v

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Exchange Rate Scraper
        run: node scripts/run-exchange-rate-scraper.js
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
